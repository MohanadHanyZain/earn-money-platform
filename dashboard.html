<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - أرباحي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <!-- شريط التنقل (Navbar) -->
    <nav class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center">
        <h1 class="text-xl font-bold text-green-400">منصة الأرباح</h1>
        <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 px-4 py-1 rounded text-sm transition">تسجيل خروج</button>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        <!-- رسالة الترحيب والكرت الأساسي -->
        <div class="bg-gray-800 rounded-xl p-8 shadow-2xl border border-gray-700 text-center mb-6">
            <h2 class="text-2xl mb-2">أهلاً بك، <span id="userName" class="font-bold text-green-400">...</span></h2>
            <p class="text-gray-400 mb-6">رصيدك الحالي من النقاط</p>
            
            <div class="inline-block bg-gray-900 px-8 py-4 rounded-full border-2 border-green-500">
                <span id="userPoints" class="text-5xl font-black text-green-500">0</span>
                <span class="text-sm text-gray-400">نقطة</span>
            </div>
        </div>

        <!-- أزرار التنقل السريع المعدلة (3 أزرار متناسقة) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <a href="offers.html" class="bg-blue-600 hover:bg-blue-700 p-6 rounded-lg text-center font-bold text-xl transition flex flex-col items-center justify-center gap-2">
                <span>🚀</span> تنفيذ العروض
            </a>
            <!-- الزر الجديد للروابط المختصرة -->
            <a href="shortlinks.html" class="bg-orange-600 hover:bg-orange-700 p-6 rounded-lg text-center font-bold text-xl transition flex flex-col items-center justify-center gap-2">
                <span>🔗</span> الروابط المختصرة (50 رابط)
            </a>
            <a href="withdraw.html" class="bg-purple-600 hover:bg-purple-700 p-6 rounded-lg text-center font-bold text-xl transition flex flex-col items-center justify-center gap-2">
                <span>💰</span> سحب الأرباح
            </a>
        </div>
    </div>

    <script>
        // --- 1. إعدادات سوبابيز ---
        const SUPABASE_URL = 'https://qilhlovlotvieatbtkhw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbGhsb3Zsb3R2aWVhdGJ0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjQ4MDYsImV4cCI6MjA5NDM0MDgwNn0.b7NeZuXf_IighzSDDV2OpgIlM0QiaeKHBwyz2leo1GA';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 2. التحقق من الدخول وجلب البيانات ---
        async function initDashboard() {
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (!user) {
                window.location.href = 'auth.html';
                return;
            }

            document.getElementById('userName').innerText = user.user_metadata.display_name || "يا بطل";

            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('points')
                .eq('id', user.id)
                .single();

            if (profile) {
                document.getElementById('userPoints').innerText = profile.points;
            }

            subscribeToPoints(user.id);
        }

        // --- 3. وظيفة التحديث اللحظي ---
        function subscribeToPoints(userId) {
            supabaseClient
                .channel('realtime:points')
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'profiles',
                    filter: `id=eq.${userId}` 
                }, payload => {
                    document.getElementById('userPoints').innerText = payload.new.points;
                    document.getElementById('userPoints').classList.add('animate-pulse');
                    setTimeout(() => document.getElementById('userPoints').classList.remove('animate-pulse'), 1000);
                })
                .subscribe();
        }

        // --- 4. تسجيل الخروج ---
        document.getElementById('logoutBtn').onclick = async () => {
            await supabaseClient.auth.signOut();
            window.location.href = 'auth.html';
        };

        initDashboard();
    </script>
</body>
</html>
