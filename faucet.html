        <!-- Main Faucet Claim Card -->
        <div class="faucet-card rounded-2xl p-8 shadow-2xl border border-gray-700 text-center transition-all duration-300">

            <!-- Claim Button & Cooldown Section -->
            <div class="space-y-6 flex flex-col items-center justify-center">

                        class="w-full sm:w-72 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-black py-5 px-8 rounded-xl text-xl shadow-xl transition transform hover:scale-105 disabled:opacity-60 disabled:scale-100 disabled:cursor-not-allowed flex items-center justify-center gap-2">

    <script>
        // ==================== SUPABASE CONFIGURATION (FULLY ORIGINAL - NO CHANGES) ====================
        const SUPABASE_URL = 'https://qilhlovlotvieatbtkhw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbGhsb3Zsb3R2aWVhdGJ0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjQ4MDYsImV4cCI6MjA5NDM0MDgwNn0.b7NeZuXf_IighzSDDV2OpgIlM0QiaeKHBwyz2leo1GA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let countdownInterval;
        const REWARD_POINTS = 3;

        // --- Fetch current user and initialize faucet state ---
        async function initFaucet() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }

            // Fetch and display current points
            const { data: profile, error: profileError } = await supabaseClient
                .from('profiles')
                .select('points')
                .eq('id', user.id)
                .single();
            
            if (profile && profile.points !== undefined) {
                document.getElementById('topPoints').innerText = profile.points;
            } else {
                document.getElementById('topPoints').innerText = '0';
            }

            // Check existing cooldown from faucet_claims table
            const { data: claimData, error: claimError } = await supabaseClient
                .from('faucet_claims')
                .select('last_claimed_at')
                .eq('user_id', user.id)
                .single();
            
            if (claimData && claimData.last_claimed_at) {
                const lastClaimTime = new Date(claimData.last_claimed_at).getTime();
                const timePassed = Math.floor((Date.now() - lastClaimTime) / 1000);
                const cooldownDuration = 300; // 5 minutes = 300 seconds

                if (timePassed < cooldownDuration) {
                    startCooldown(cooldownDuration - timePassed);
                }
            }
        }

        // --- Main claim function calling Supabase RPC (exactly as original) ---
        async function runFaucetClaim() {
            const claimBtn = document.getElementById('claimBtn');
            claimBtn.disabled = true;
            claimBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i><span> Processing...</span>';

            // Call secure RPC function that handles cooldown and points addition
            const { data, error } = await supabaseClient.rpc('claim_faucet_points', { reward_points: REWARD_POINTS });

            if (error) {
                console.error("RPC Error:", error);
                alert("⚠️ Unexpected error occurred. Please refresh and try again.");
                claimBtn.disabled = false;
                claimBtn.innerHTML = '<i class="fas fa-tint"></i><span>Claim Now</span>';
                return;
            }

            // Response is an array with single object
            const result = data[0];

            if (result.success) {
                // Show success message with small notification
                showToast(result.message || "✅ You earned 3 points!", "success");
                
                // Update points display instantly
                const pointsSpan = document.getElementById('topPoints');
                let currentPoints = parseInt(pointsSpan.innerText);
                if (isNaN(currentPoints)) currentPoints = 0;
                pointsSpan.innerText = currentPoints + REWARD_POINTS;
                
                // Start cooldown timer
                if (result.next_claim_in && result.next_claim_in > 0) {
                    startCooldown(result.next_claim_in);
                } else {
                    startCooldown(300);
                }
            } else {
                // User is on cooldown or error message from RPC
                alert(result.message || "❌ Cannot claim at this moment.");
                if (result.next_claim_in && result.next_claim_in > 0) {
                    startCooldown(result.next_claim_in);
                }
                claimBtn.disabled = false;
                claimBtn.innerHTML = '<i class="fas fa-tint"></i><span>Claim Now</span>';
            }
        }

        // --- Cooldown timer with minutes:seconds format ---
        function startCooldown(seconds) {
            const claimBtn = document.getElementById('claimBtn');
            const container = document.getElementById('cooldownContainer');
            const timerText = document.getElementById('cooldownTimer');

            // Clear any existing interval
            if (countdownInterval) clearInterval(countdownInterval);
            
            claimBtn.disabled = true;
            claimBtn.innerHTML = '<i class="fas fa-lock"></i><span> Locked</span>';
            container.classList.remove('hidden');

            let remaining = seconds;
            
            const updateTimer = () => {
                const mins = Math.floor(remaining / 60).toString().padStart(2, '0');
                const secs = (remaining % 60).toString().padStart(2, '0');
                timerText.innerText = `${mins}:${secs}`;
                
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    claimBtn.disabled = false;
                    claimBtn.innerHTML = '<i class="fas fa-tint"></i><span>Claim Now</span>';
                    container.classList.add('hidden');
                }
                remaining--;
            };
            
            updateTimer(); // initial display
            countdownInterval = setInterval(updateTimer, 1000);
        }

        // Simple toast notification (doesn't interfere with any core function)
        function showToast(message, type = "info") {
            // Create temporary toast element
            const toast = document.createElement('div');
            toast.className = `fixed bottom-5 right-5 z-50 bg-gray-800 border-l-4 ${type === 'success' ? 'border-green-500' : 'border-orange-500'} text-white px-5 py-3 rounded-lg shadow-2xl text-sm font-medium flex items-center gap-2 animate-bounce`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle text-green-400' : 'fa-exclamation-triangle text-orange-400'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // Initialize everything when page loads
        initFaucet();
    </script>
