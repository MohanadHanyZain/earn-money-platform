    <style>

        ::-webkit-scrollbar { width: 5px; }

        }
        .points-badge span { color: #3B82F6; font-weight: 700; }
        .faucet-container { max-width: 768px; margin: 0 auto; padding: 1.5rem; }
        .ad-banner {
            display: flex;
            justify-content: center;
            margin-bottom: 1.75rem;
            background-color: #0F1117;
            border: 1px solid #1F222A;

        }
        .corporate-card {
            background-color: #0F1117;

        }
        .card-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; color: #F0F3F8; }
        .card-subtitle { color: #9CA3AF; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .reward-highlight { color: #3B82F6; font-weight: 700; }
        .claim-btn {
            background-color: #3B82F6;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 1rem 2rem;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.2s;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }
        .claim-btn:hover:not(:disabled) { background-color: #2563EB; }
        .claim-btn:disabled { background-color: #2C303A; cursor: not-allowed; opacity: 0.7; }
        .cooldown-container { margin-top: 1rem; color: #F59E0B; font-weight: 600; font-size: 0.9rem; }
        .cooldown-timer { font-family: monospace; font-size: 1.1rem; letter-spacing: 1px; }
        .hidden { display: none; }
        .text-center { text-align: center; }
        .navbar, .corporate-card, .claim-btn, .points-badge, .ad-banner { border-radius: 0; }
        @media (max-width: 640px) {
            .navbar { padding: 0.85rem 1rem; }
            .navbar-left { gap: 1rem; }
            .page-title { font-size: 1rem; }
            .points-badge { font-size: 0.7rem; padding: 0.3rem 0.8rem; }
            .faucet-container { padding: 1rem; }
            .corporate-card { padding: 1.5rem 1.25rem; }
            .card-title { font-size: 1.25rem; }
            .claim-btn { padding: 0.8rem 1.5rem; font-size: 1rem; max-width: 100%; }
            .ad-banner { padding: 0.25rem; }
        }
        @media (min-width: 768px) { .corporate-card { padding: 2.25rem; } }
        .claim-btn:focus-visible, .back-link:focus-visible { outline: 2px solid #3B82F6; outline-offset: 2px; }

<body>

    <nav class="navbar">

        </div>
        <div class="points-badge">
            BALANCE: <span id="topPoints">0</span> POINTS

    </nav>

    <div class="faucet-container">
        <div class="ad-banner">
            <div style="text-align: center;">
                <script>
                    atOptions = {
                        'key' : '3332ff0dea9a4b480c786186c2112ea9',

        <div class="corporate-card">
            <h2 class="card-title">CLAIM FREE REWARD</h2>
            <p class="card-subtitle">Earn <span class="reward-highlight">3 POINTS</span> every 5 minutes — zero effort</p>
            <div class="text-center">
                <button id="claimBtn" onclick="runFaucetClaim()" class="claim-btn">
                    CLAIM REWARD 💰
                </button>
                <div id="cooldownContainer" class="cooldown-container hidden">

    <!-- Social Bar Script - ORIGINAL, COMPLETELY UNTOUCHED -->
    <script src="https://pl29465244.effectivecpmnetwork.com/d6/a7/90/d6a790a2620fed6eed0f53885cbb2f75.js"></script>

    <script>
        const SUPABASE_URL = 'https://qilhlovlotvieatbtkhw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbGhsb3Zsb3R2aWVhdGJ0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjQ4MDYsImV4cCI6MjA5NDM0MDgwNn0.b7NeZuXf_IighzSDDV2OpgIlM0QiaeKHBwyz2leo1GA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let countdownInterval;
        const REWARD_POINTS = 3;

        async function initFaucet() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = 'auth.html';
            const { data: profile } = await supabaseClient.from('profiles').select('points').eq('id', user.id).single();
            if (profile) document.getElementById('topPoints').innerText = profile.points;
            const { data: claimData } = await supabaseClient.from('faucet_claims').select('last_claimed_at').eq('user_id', user.id).single();
            if (claimData) {
                const lastClaimTime = new Date(claimData.last_claimed_at).getTime();
                const timePassed = Math.floor((Date.now() - lastClaimTime) / 1000);
                const cooldownDuration = 300;
                if (timePassed < cooldownDuration) startCooldown(cooldownDuration - timePassed);
            }
        }

        async function runFaucetClaim() {
            const claimBtn = document.getElementById('claimBtn');
            claimBtn.disabled = true;
            claimBtn.innerText = "VERIFYING... ⏳";
            const { data, error } = await supabaseClient.rpc('claim_faucet_points', { reward_points: REWARD_POINTS });
            if (error) {
                alert("Unexpected database error occurred.");
                claimBtn.disabled = false;
                claimBtn.innerText = "CLAIM REWARD 💰";
                return;
            }
            const result = data[0];
            if (result.success) {
                alert(result.message);
                const topPointsEl = document.getElementById('topPoints');
                topPointsEl.innerText = parseInt(topPointsEl.innerText) + REWARD_POINTS;
                startCooldown(result.next_claim_in);
            } else {
                alert(result.message);
                startCooldown(result.next_claim_in);
            }
        }

        function startCooldown(seconds) {
            const claimBtn = document.getElementById('claimBtn');
            const container = document.getElementById('cooldownContainer');
            const timerText = document.getElementById('cooldownTimer');
            claimBtn.disabled = true;
            claimBtn.innerText = "LOCKED 🔒";
            container.classList.remove('hidden');
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                seconds--;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                timerText.innerText = `${mins}:${secs}`;
                if (seconds <= 0) {
                    clearInterval(countdownInterval);
                    claimBtn.disabled = false;
                    claimBtn.innerText = "CLAIM REWARD 💰";
                    container.classList.add('hidden');
                }
            }, 1000);
        }

        initFaucet();
    </script>
