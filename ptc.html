<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاهدة إعلانات PTC - منصة الأرباح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <nav class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center px-6">
        <div class="flex items-center gap-4">
            <a href="dashboard.html" class="text-gray-400 hover:text-white transition">⬅️ العودة للرئيسية</a>
            <h1 class="text-xl font-bold text-green-400">👁️ إعلانات PTC اليومية</h1>
        </div>
        <div class="bg-gray-900 px-4 py-1 rounded border border-gray-700 text-sm">
            رصيدك الحالي: <span id="userPoints" class="text-green-400 font-bold">0</span> نقطة
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6 mt-6">
        
        <div id="activeAdSection" class="hidden bg-gray-800 p-6 rounded-xl border border-blue-500/50 text-center mb-8 shadow-xl animate-pulse">
            <p class="text-yellow-400 text-base font-bold mb-2">⚠️ تنبيه هام: برجاء عدم إغلاق صفحة الإعلان المفتوحة حتى ينتهي العداد!</p>
            <div class="text-gray-400 text-sm mb-3">متبقي على تأكيد المكافأة:</div>
            <div id="countdownTimer" class="text-5xl font-black text-blue-400 my-2">30</div>
            
            <button id="confirmClaimBtn" class="hidden mx-auto bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-black px-8 py-3 rounded-lg transition transform hover:scale-105 shadow-lg mt-4">
                ✅ تأكيد المشاهدة والحصول على النقاط
            </button>
        </div>

        <h2 class="text-lg font-bold mb-4 text-gray-400">الإعلانات المتاحة لك اليوم:</h2>
        <div id="adsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div id="loadingText" class="text-center text-gray-500 col-span-full py-8">جاري تحميل الإعلانات المتاحة...</div>
        </div>
    </div>

    <script>
        // إعدادات سوبابيز الخاصة بك
        const SUPABASE_URL = 'https://qilhlovlotvieatbtkhw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbGhsb3Zsb3R2aWVhdGJ0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjQ4MDYsImV4cCI6MjA5NDM0MDgwNn0.b7NeZuXf_IighzSDDV2OpgIlM0QiaeKHBwyz2leo1GA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let userId = null;
        let activeAdId = null;
        let timerInterval = null;

        // 1. التحقق من المستخدم وجلب رصيده الحالي
        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }
            userId = user.id;
            
            // جلب النقاط وعرضها بالشبكة
            const { data: profile } = await supabaseClient.from('profiles').select('points').eq('id', userId).single();
            if (profile) {
                document.getElementById('userPoints').innerText = profile.points || 0;
            }
            
            loadAvailableAds();
        }

        // 2. جلب وفلترة الإعلانات التي لم يشاهدها المستخدم في آخر 24 ساعة
        async function loadAvailableAds() {
            try {
                // جلب كل الإعلانات النشطة من جدول ptc_ads
                const { data: allAds } = await supabaseClient.from('ptc_ads').select('*');
                
                // جلب تاريخ مشاهدات هذا المستخدم في آخر 24 ساعة
                const timeLimit = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
                const { data: watchedAds } = await supabaseClient
                    .from('ptc_history')
                    .select('ad_id')
                    .eq('user_id', userId)
                    .gt('watched_at', timeLimit);

                const watchedIds = watchedAds ? watchedAds.map(item => item.ad_id) : [];
                const adsContainer = document.getElementById('adsContainer');
                document.getElementById('loadingText').classList.add('hidden');
                
                // فلترة الإعلانات المتبقية
                const availableAds = allAds ? allAds.filter(ad => !watchedIds.includes(ad.id)) : [];

                if (availableAds.length === 0) {
                    adsContainer.innerHTML = `<div class="text-center text-gray-500 col-span-full py-8">🎉 لقد شاهدت جميع إعلانات اليوم! انتظر تجددها تلقائياً.</div>`;
                    return;
                }

                adsContainer.innerHTML = ''; // تنظيف الصندوق
                
                // بناء الكروت الإعلانية بالـ DOM
                availableAds.forEach(ad => {
                    const card = document.createElement('div');
                    card.className = "bg-gray-800 p-5 rounded-xl border border-gray-700 flex justify-between items-center shadow-md";
                    card.innerHTML = `
                        <div>
                            <h3 class="font-bold text-white mb-1">${ad.title}</h3>
                            <p class="text-xs text-gray-400 mb-2">المدة: ${ad.duration} ثانية</p>
                            <div class="text-green-400 text-sm font-bold">💰 +${ad.reward_points} نقطة</div>
                        </div>
                        <button onclick="watchAd('${ad.id}', '${ad.url}', ${ad.duration})" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-5 rounded-lg text-sm transition transform hover:scale-105 shadow-md">
                            شاهد الآن 👁️
                        </button>
                    `;
                    adsContainer.appendChild(card);
                });

            } catch (err) {
                console.error(err);
            }
        }

        // 3. الضغط على "شاهد الآن" -> فتح الإعلان في تبويب وتشغيل العداد بالموقع الرئيسي
        function watchAd(adId, adUrl, duration) {
            // منع المستخدم من تشغيل أكثر من عداد في نفس الوقت
            if (activeAdId) {
                alert("يرجى إنهاء الإعلان الحالي أولاً!");
                return;
            }

            activeAdId = adId;
            
            // فتح الرابط الذكي (Adsterra Smart Link) في تبويب جديد تماماً لتأمين الـ CPM المرتفع
            window.open(adUrl, '_blank');

            // إظهار صندوق العداد والتنبيه للمستخدم فوق
            const activeAdSection = document.getElementById('activeAdSection');
            const timerEl = document.getElementById('countdownTimer');
            const confirmBtn = document.getElementById('confirmClaimBtn');
            
            activeAdSection.classList.remove('hidden');
            confirmBtn.classList.add('hidden'); // إخفاء زر التأكيد في البداية
            
            let timeLeft = duration;
            timerEl.innerText = timeLeft;

            // تشغيل العداد التنازلي التلقائي
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerEl.innerText = "✓";
                    // إظهار زر "تأكيد المشاهدة" بعد انتهاء الوقت تماماً
                    confirmBtn.classList.remove('hidden');
                }
            }, 1000);
        }

        // 4. الضغط على زر "تأكيد المشاهدة" بعد انتهاء العداد لإضافة النقاط في السيرفر
        document.getElementById('confirmClaimBtn').onclick = async () => {
            if (!activeAdId || !userId) return;

            const confirmBtn = document.getElementById('confirmClaimBtn');
            confirmBtn.disabled = true;
            confirmBtn.innerText = "جاري التأمين وإضافة النقاط... ⏳";

            try {
                // استدعاء دالة الـ RPC الأمنية في سوبابيز لاحتساب المشاهدة وزيادة الرصيد من السيرفر
                const { data, error } = await supabaseClient.rpc('claim_ptc_reward', {
                    _user_id: userId,
                    _ad_id: activeAdId
                });

                if (error) throw new Error(error.message);

                alert("🎉 مبارك! تم التحقق من مشاهدتك بنجاح وإضافة النقاط لرصيدك.");
                
                // إعادة تهيئة الواجهة
                clearInterval(timerInterval);
                activeAdId = null;
                document.getElementById('activeAdSection').classList.add('hidden');
                
                // تحديث البيانات على الشاشة فوراً
                await checkUser();

            } catch (err) {
                alert("خطأ: " + err.message);
            } finally {
                confirmBtn.disabled = false;
                confirmBtn.innerText = "✅ تأكيد المشاهدة والحصول على النقاط";
            }
        };

        // تشغيل الصفحة
        checkUser();
    </script>
</body>
</html>
