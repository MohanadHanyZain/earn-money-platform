<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاهدة الإعلانات - منصة الأرباح</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen relative">

    <!-- شريط التنقل (Navbar) -->
    <nav class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="dashboard.html" class="text-gray-400 hover:text-white transition">⬅️ العودة للرئيسية</a>
            <h1 class="text-xl font-bold text-indigo-400">مشاهدة إعلانات PTC</h1>
        </div>
        <div class="bg-gray-900 px-4 py-1 rounded border border-gray-700 text-sm">
            رصيدك: <span id="topPoints" class="text-green-400 font-bold">0</span> نقطة
        </div>
    </nav>

    <!-- شاشة الإعلان المنبثقة الكاملة (تظهر فوق الموقع لضمان عمل العداد) -->
    <div id="adModal" class="hidden fixed inset-0 bg-gray-950 z-50 flex flex-col">
        <!-- بار العداد العلوي -->
        <div class="bg-gray-900 p-4 border-b border-gray-800 flex justify-between items-center px-8">
            <div class="text-lg font-bold text-indigo-400">شاهد الإعلان لكسب النقاط</div>
            <div class="bg-gray-800 px-6 py-2 rounded-full text-2xl font-black text-red-500">
                انتظر: <span id="countdown">30</span> ثانية
            </div>
        </div>
        <!-- مكان عرض الإعلان المباشر داخل موقعك -->
        <iframe id="adFrame" class="w-full flex-1 bg-white" src=""></iframe>
    </div>

    <div class="max-w-4xl mx-auto p-6">
        <!-- مكان عرض الإعلانات المتاحة -->
        <h2 class="text-xl font-bold mb-4 text-gray-400">الإعلانات المتاحة اليوم:</h2>
        <div id="adsList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="p-6 bg-gray-800 rounded-lg text-center text-gray-500 col-span-full">جاري تحميل الإعلانات...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qilhlovlotvieatbtkhw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbGhsb3Zsb3R2aWVhdGJ0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjQ4MDYsImV4cCI6MjA5NDM0MDgwNn0.b7NeZuXf_IighzSDDV2OpgIlM0QiaeKHBwyz2leo1GA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let timerInterval;
        let timeLeft = 0;
        let currentAdReward = 0;
        let currentAdId = null;

        async function initPTC() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }

            // 1. جلب وعرض النقاط
            const { data: profile } = await supabaseClient.from('profiles').select('points').eq('id', user.id).single();
            if (profile) document.getElementById('topPoints').innerText = profile.points;

            // 2. جلب تاريخ إعلانات آخر 24 ساعة للمستخدم
            const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const { data: history } = await supabaseClient
                .from('ptc_history')
                .select('ad_id')
                .eq('user_id', user.id)
                .gte('viewed_at', oneDayAgo);

            const viewedAdIds = history ? history.map(h => h.ad_id) : [];

            // 3. جلب الإعلانات وفلترتها
            const { data: ads, error } = await supabaseClient.from('ptc_ads').select('*');
            const adsListDiv = document.getElementById('adsList');
            adsListDiv.innerHTML = '';

            const availableAds = ads ? ads.filter(ad => !viewedAdIds.includes(ad.id)) : [];

            if (error || availableAds.length === 0) {
                adsListDiv.innerHTML = `<div class="p-6 bg-gray-800 rounded-lg text-center text-gray-500 col-span-full">رائع! لقد شاهدت كل إعلانات اليوم، عد لاحقاً.</div>`;
                return;
            }

            availableAds.forEach(ad => {
                adsListDiv.innerHTML += `
                    <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 flex flex-col justify-between shadow-lg">
                        <div>
                            <h3 class="text-lg font-bold text-white mb-2">${ad.title}</h3>
                            <p class="text-sm text-gray-400 mb-4">⏱️ المدة: ${ad.duration} ثانية | 💰 الجائزة: ${ad.reward_points} نقاط</p>
                        </div>
                        <button onclick="watchAd('${ad.adsterra_url}', ${ad.duration}, ${ad.reward_points}, ${ad.id})" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded transition text-center">
                            شاهد الآن 🚀
                        </button>
                    </div>
                `;
            });
        }

        // --- دالة تشغيل الإعلان بالداخل ---
        function watchAd(url, duration, reward, adId) {
            timeLeft = duration;
            currentAdReward = reward;
            currentAdId = adId;

            // شحن الـ iframe برابط إعلان Adsterra وفتح الشاشة الكبيرة
            document.getElementById('adFrame').src = url;
            document.getElementById('adModal').classList.remove('hidden');
            document.getElementById('countdown').innerText = timeLeft;

            // بدء العداد المضمون (لأننا في نفس الصفحة ولم نغادرها!)
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('countdown').innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('adModal').classList.add('hidden');
                    document.getElementById('adFrame').src = ""; // تفريغ الإعلان
                    giveReward();
                }
            }, 1000);
        }

        // --- منح الجائزة وتحديث قاعدة البيانات وتحديث الواجهة تلقائياً ---
        async function giveReward() {
            const { error } = await supabaseClient.rpc('claim_ptc_reward', { 
                ad_id_param: currentAdId, 
                points_to_add: currentAdReward 
            });

            if (!error) {
                alert(`🎯 مبروك! تمت إضافة +${currentAdReward} نقاط واحتساب الإعلان كمشاهد.`);
                initPTC(); // لإعادة قراءة البيانات وإخفاء الإعلان المشاهد فوراً!
            } else {
                alert("حدث خطأ أثناء ترحيل النقاط للرصيد.");
            }
        }

        initPTC();
    </script>
</body>
</html>
