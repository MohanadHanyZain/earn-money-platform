<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PTC Ads | Enterprise Earnings Platform</title>
    <!-- Supabase JS Library (only external dependency) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ---------- RESET & BASE - Corporate Dark Mode | Strict | Minimal ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0A0C10;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, 'Helvetica Neue', sans-serif;
            color: #E8EDF2;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            position: relative;
        }

        /* Professional scrollbar - minimal & strict */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #14171C;
        }
        ::-webkit-scrollbar-thumb {
            background: #2C3038;
            border-radius: 0px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3F444E;
        }

        /* Navigation - strict enterprise bar */
        .navbar {
            background-color: #0D0F13;
            border-bottom: 1px solid #1E2128;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .navbar-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .back-link {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            transition: color 0.2s ease;
        }
        .back-link:hover {
            color: #3B82F6;
        }
        .page-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #F0F3F8;
        }
        .page-title-accent {
            color: #3B82F6;
        }
        .points-badge {
            background-color: #050608;
            border: 1px solid #2C303A;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
        }
        .points-badge span {
            color: #3B82F6;
            font-weight: 700;
        }

        /* Main container */
        .ptc-container {
            max-width: 1024px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Section header */
        .section-header {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #9CA3AF;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        /* Ads grid - responsive corporate cards */
        .ads-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        /* Corporate ad card - rigid geometry, no rounded corners */
        .ad-card {
            background-color: #0F1117;
            border: 1px solid #1F222A;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .ad-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #F0F3F8;
            margin-bottom: 0.5rem;
        }
        .ad-meta {
            font-size: 0.75rem;
            color: #6B7280;
            margin-bottom: 1rem;
            letter-spacing: 0.3px;
        }
        .ad-meta span {
            color: #3B82F6;
            font-weight: 600;
        }
        .watch-btn {
            background-color: #3B82F6;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 0.7rem;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.2s ease;
            width: 100%;
        }
        .watch-btn:hover {
            background-color: #2563EB;
        }

        /* Empty state message */
        .empty-message {
            background-color: #0F1117;
            border: 1px solid #1F222A;
            padding: 2rem;
            text-align: center;
            color: #6B7280;
            font-size: 0.9rem;
        }

        /* Modal overlay - fullscreen corporate ad viewer */
        .ad-modal {
            position: fixed;
            inset: 0;
            background-color: #0A0C10;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        .hidden {
            display: none;
        }
        .modal-header {
            background-color: #0D0F13;
            border-bottom: 1px solid #1E2128;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .modal-title {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #3B82F6;
            text-transform: uppercase;
        }
        .countdown-badge {
            background-color: #050608;
            border: 1px solid #EF4444;
            padding: 0.5rem 1.25rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: #EF4444;
            font-family: 'JetBrains Mono', monospace;
        }
        .ad-iframe {
            width: 100%;
            flex: 1;
            background-color: white;
            border: none;
        }

        /* No border radius anywhere - strict corporate geometry */
        .navbar, .ad-card, .watch-btn, .points-badge, .empty-message, .modal-header, .countdown-badge {
            border-radius: 0px;
        }

        /* Responsive adjustments - mobile perfection */
        @media (min-width: 640px) {
            .ads-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.25rem;
            }
        }

        @media (max-width: 640px) {
            .navbar {
                padding: 0.85rem 1rem;
            }
            .navbar-left {
                gap: 1rem;
            }
            .page-title {
                font-size: 1rem;
            }
            .points-badge {
                font-size: 0.7rem;
                padding: 0.3rem 0.8rem;
            }
            .ptc-container {
                padding: 1rem;
            }
            .ad-card {
                padding: 1.25rem;
            }
            .modal-header {
                padding: 0.75rem 1rem;
            }
            .countdown-badge {
                font-size: 1rem;
                padding: 0.35rem 0.9rem;
            }
        }

        /* Accessibility focus outlines */
        .watch-btn:focus-visible, .back-link:focus-visible {
            outline: 2px solid #3B82F6;
            outline-offset: 2px;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar (original structure preserved) -->
    <nav class="navbar">
        <div class="navbar-left">
            <a href="dashboard.html" class="back-link">← BACK TO DASHBOARD</a>
            <h1 class="page-title"><span class="page-title-accent">PTC</span> ADS</h1>
        </div>
        <div class="points-badge">
            BALANCE: <span id="topPoints">0</span> POINTS
        </div>
    </nav>

    <div class="ptc-container">
        <div class="section-header">AVAILABLE ADS (24H CYCLE)</div>
        <div id="adsList" class="ads-grid">
            <div class="empty-message">LOADING ADS...</div>
        </div>
    </div>

    <!-- Fullscreen Ad Modal (original structure preserved) -->
    <div id="adModal" class="ad-modal hidden">
        <div class="modal-header">
            <div class="modal-title">WATCH AD TO EARN POINTS</div>
            <div class="countdown-badge">
                WAIT: <span id="countdown">30</span> SEC
            </div>
        </div>
        <iframe id="adFrame" class="ad-iframe" src=""></iframe>
    </div>

    <script>
        // --------------------------------------------------------------
        // !!! ABSOLUTELY NO FUNCTIONAL CHANGES - ORIGINAL LOGIC PRESERVED !!!
        // Only visual redesign (CSS). All Supabase logic, RPC calls,
        // modal handling, countdown, and reward system remain identical.
        // --------------------------------------------------------------
        
        const SUPABASE_URL = 'https://qilhlovlotvieatbtkhw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbGhsb3Zsb3R2aWVhdGJ0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjQ4MDYsImV4cCI6MjA5NDM0MDgwNn0.b7NeZuXf_IighzSDDV2OpgIlM0QiaeKHBwyz2leo1GA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let timerInterval;
        let timeLeft = 0;
        let currentAdReward = 0;
        let currentAdId = null;

        async function initPTC() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }

            // 1. Fetch and display points balance
            const { data: profile } = await supabaseClient.from('profiles').select('points').eq('id', user.id).single();
            if (profile) document.getElementById('topPoints').innerText = profile.points;

            // 2. Get user's ad history from last 24 hours
            const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const { data: history } = await supabaseClient
                .from('ptc_history')
                .select('ad_id')
                .eq('user_id', user.id)
                .gte('viewed_at', oneDayAgo);

            const viewedAdIds = history ? history.map(h => h.ad_id) : [];

            // 3. Fetch all ads and filter available ones
            const { data: ads, error } = await supabaseClient.from('ptc_ads').select('*');
            const adsListDiv = document.getElementById('adsList');
            adsListDiv.innerHTML = '';

            const availableAds = ads ? ads.filter(ad => !viewedAdIds.includes(ad.id)) : [];

            if (error || availableAds.length === 0) {
                adsListDiv.innerHTML = `<div class="empty-message">✅ All ads completed for today. Please check back tomorrow.</div>`;
                return;
            }

            availableAds.forEach(ad => {
                adsListDiv.innerHTML += `
                    <div class="ad-card">
                        <div>
                            <div class="ad-title">${ad.title}</div>
                            <div class="ad-meta">⏱️ DURATION: ${ad.duration} SEC | 💰 REWARD: <span>${ad.reward_points}</span> POINTS</div>
                        </div>
                        <button onclick="watchAd('${ad.adsterra_url}', ${ad.duration}, ${ad.reward_points}, ${ad.id})" class="watch-btn">
                            WATCH NOW 🚀
                        </button>
                    </div>
                `;
            });
        }

        // Launch ad with modal and countdown
        function watchAd(url, duration, reward, adId) {
            timeLeft = duration;
            currentAdReward = reward;
            currentAdId = adId;

            // Load ad iframe and show modal
            document.getElementById('adFrame').src = url;
            document.getElementById('adModal').classList.remove('hidden');
            document.getElementById('countdown').innerText = timeLeft;

            // Start countdown timer
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('countdown').innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('adModal').classList.add('hidden');
                    document.getElementById('adFrame').src = "";
                    giveReward();
                }
            }, 1000);
        }

        // Grant reward and update database
        async function giveReward() {
            const { error } = await supabaseClient.rpc('claim_ptc_reward', { 
                ad_id_param: currentAdId, 
                points_to_add: currentAdReward 
            });

            if (!error) {
                alert(`🎯 SUCCESS! +${currentAdReward} points added.`);
                initPTC(); // Refresh the list to hide viewed ad
            } else {
                alert("Error processing reward. Please contact support.");
            }
        }

        initPTC();
    </script>
</body>
</html>
