<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدار اختصار الروابط - ShrinkMe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">

    <nav class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center px-6 shadow-md">
        <h1 class="text-xl font-bold text-blue-400">🔗 مهام ShrinkMe اليومية</h1>
        <div class="bg-gray-900 px-4 py-1 rounded border border-gray-700 text-sm">
            رصيدك: <span id="userPoints" class="text-green-400 font-bold">0</span> نقطة
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6 mt-6">
        <h2 class="text-lg font-bold mb-4 text-gray-400">الروابط المتاحة (تتجدد تلقائياً كل 24 ساعة):</h2>
        <div id="linksContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div id="loadingText" class="text-center text-gray-500 col-span-full py-8">جاري جلب الروابط...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qilhlovlotvieatbtkhw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbGhsb3Zsb3R2aWVhdGJ0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjQ4MDYsImV4cCI6MjA5NDM0MDgwNn0.b7NeZuXf_IighzSDDV2OpgIlM0QiaeKHBwyz2leo1GA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let userId = null;

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'auth.html'; return; }
            userId = user.id;
            
            const { data: profile } = await supabaseClient.from('profiles').select('points').eq('id', userId).single();
            if (profile) document.getElementById('userPoints').innerText = profile.points || 0;
            
            loadShortLinks();
        }

        async function loadShortLinks() {
            try {
                const { data: allLinks } = await supabaseClient.from('available_links').select('*');
                
                const timeLimit = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
                const { data: clickedRecords } = await supabaseClient
                    .from('user_clicks')
                    .select('link_id')
                    .eq('user_id', userId)
                    .gt('clicked_at', timeLimit);

                const clickedIds = clickedRecords ? clickedRecords.map(item => item.link_id) : [];
                const container = document.getElementById('linksContainer');
                
                if (document.getElementById('loadingText')) document.getElementById('loadingText').remove();
                container.innerHTML = '';

                const available = allLinks ? allLinks.filter(l => !clickedIds.includes(l.id)) : [];

                if (available.length === 0) {
                    container.innerHTML = `<div class="text-center text-gray-500 col-span-full py-8">🎉 ممتاز! لقد أنهيت جميع مهام الاختصار لليوم.</div>`;
                    return;
                }

                available.forEach(link => {
                    const card = document.createElement('div');
                    card.className = "bg-gray-800 p-5 rounded-xl border border-gray-700 flex justify-between items-center shadow-md";
                    
                    card.innerHTML = `
                        <div>
                            <h3 class="font-bold text-white mb-1">${link.provider_name}</h3>
                            <div class="text-green-400 text-sm font-bold">💰 +${link.points_reward} نقطة</div>
                        </div>
                        <button class="claim-btn bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg text-sm transition text-center shadow">
                            اختصار الآن 🔗
                        </button>
                    `;

                    card.querySelector('.claim-btn').onclick = async (e) => {
                        const btn = e.target;
                        btn.disabled = true;
                        btn.innerText = "جاري الاتصال بـ ShrinkMe... ⏳";

                        try {
                            // دمج الـ userId في نهاية الرابط الخاص بـ ShrinkMe
                            const apiUrl = `${link.short_url}${userId}`;
                            const response = await fetch(apiUrl);
                            const data = await response.json();

                            // فحص استجابة سيرفر ShrinkMe
                            if (data.status === "success" && data.shortenedUrl) {
                                
                                // الحل هنا: لا نسجل النقرة في قاعدة البيانات إلا بعد التأكد من أن الرابط جاهز وفتح بنجاح
                                const { error: rpcError } = await supabaseClient.rpc('register_link_click', {
                                    _user_id: userId,
                                    _link_id: link.id
                                });

                                if (rpcError) {
                                    alert(rpcError.message);
                                    btn.disabled = false;
                                    btn.innerText = "اختصار الآن 🔗";
                                    return;
                                }

                                // فتح صفحة تخطي إعلانات ShrinkMe المستقرة
                                window.open(data.shortenedUrl, '_blank');
                                
                                // تحديث الواجهة فوراً لإخفاء الرابط المستهلك
                                loadShortLinks();

                            } else {
                                alert("فشل جلب الرابط من ShrinkMe، حاول مجدداً.");
                                btn.disabled = false;
                                btn.innerText = "اختصار الآن 🔗";
                            }

                        } catch (err) {
                            console.error(err);
                            alert("حدث خطأ في الشبكة أثناء الاتصال بموقع الاختصار.");
                            btn.disabled = false;
                            btn.innerText = "اختصار الآن 🔗";
                        }
                    };

                    container.appendChild(card);
                });

            } catch (err) {
                console.error(err);
            }
        }

        checkUser();
    </script>
</body>
</html>
