<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Shortlinks | Enterprise Earnings Platform</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ---------- RESET & BASE - Corporate Dark Mode | Strict | Minimal ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0A0C10;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, 'Helvetica Neue', sans-serif;
            color: #E8EDF2;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }

        /* Professional scrollbar - minimal & strict */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #14171C;
        }
        ::-webkit-scrollbar-thumb {
            background: #2C3038;
            border-radius: 0px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3F444E;
        }

        /* Navigation - strict enterprise bar */
        .navbar {
            background-color: #0D0F13;
            border-bottom: 1px solid #1E2128;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .navbar-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .back-link {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            transition: color 0.2s ease;
        }
        .back-link:hover {
            color: #3B82F6;
        }
        .page-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #F0F3F8;
        }
        .page-title-accent {
            color: #3B82F6;
        }
        .points-badge {
            background-color: #050608;
            border: 1px solid #2C303A;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
        }
        .points-badge span {
            color: #3B82F6;
            font-weight: 700;
        }

        /* Main container */
        .shortlinks-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Info banner - corporate announcement */
        .info-banner {
            background-color: #0F1117;
            border: 1px solid #1F222A;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        @media (min-width: 768px) {
            .info-banner {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }
        .banner-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #F0F3F8;
            margin-bottom: 0.25rem;
        }
        .banner-title span {
            color: #3B82F6;
        }
        .banner-desc {
            color: #9CA3AF;
            font-size: 0.75rem;
        }
        .reward-pill {
            background-color: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 0.5rem 1.25rem;
            font-size: 0.8rem;
            font-weight: 700;
            color: #3B82F6;
            white-space: nowrap;
        }

        /* Links grid */
        .links-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        /* Corporate link card */
        .link-card {
            background-color: #0F1117;
            border: 1px solid #1F222A;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: border-color 0.2s ease;
        }
        .link-card:not(.completed):hover {
            border-color: #3B82F6;
        }
        .link-card.completed {
            opacity: 0.6;
            background-color: #0B0D11;
        }
        .link-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .provider-tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.2rem 0.6rem;
            background-color: #050608;
            color: #9CA3AF;
            border: 1px solid #2C303A;
        }
        .provider-tag.active {
            border-color: #3B82F6;
            color: #3B82F6;
        }
        .link-id {
            font-size: 0.65rem;
            color: #4B5563;
        }
        .reward-text {
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .reward-text.active {
            color: #E5E9F0;
        }
        .reward-text.completed {
            color: #4B5563;
        }
        .action-btn {
            width: 100%;
            padding: 0.65rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.2s ease;
            border: none;
        }
        .action-btn.active {
            background-color: #3B82F6;
            color: white;
        }
        .action-btn.active:hover {
            background-color: #2563EB;
        }
        .action-btn.completed {
            background-color: #1F222A;
            color: #6B7280;
            cursor: not-allowed;
        }

        /* Loading and empty states */
        .loader-message {
            text-align: center;
            padding: 2.5rem;
            color: #6B7280;
            border: 1px solid #1F222A;
            background-color: #0F1117;
        }
        .hidden {
            display: none;
        }

        /* No border radius - strict corporate geometry */
        .navbar, .info-banner, .link-card, .reward-pill, .action-btn, .provider-tag, .points-badge, .loader-message {
            border-radius: 0px;
        }

        /* Responsive adjustments */
        @media (min-width: 640px) {
            .links-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.25rem;
            }
        }
        @media (min-width: 1024px) {
            .links-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 1.5rem;
            }
        }
        @media (max-width: 640px) {
            .navbar {
                padding: 0.85rem 1rem;
            }
            .navbar-left {
                gap: 1rem;
            }
            .page-title {
                font-size: 1rem;
            }
            .points-badge {
                font-size: 0.7rem;
                padding: 0.3rem 0.8rem;
            }
            .shortlinks-container {
                padding: 1rem;
            }
            .info-banner {
                padding: 1rem;
            }
            .banner-title {
                font-size: 0.95rem;
            }
            .reward-pill {
                font-size: 0.7rem;
                padding: 0.4rem 1rem;
            }
        }

        /* Accessibility focus outlines */
        .action-btn:focus-visible, .back-link:focus-visible {
            outline: 2px solid #3B82F6;
            outline-offset: 2px;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar (original structure preserved) -->
    <nav class="navbar">
        <div class="navbar-left">
            <a href="dashboard.html" class="back-link">← BACK TO DASHBOARD</a>
            <h1 class="page-title"><span class="page-title-accent">SHORT</span> LINKS</h1>
        </div>
        <div class="points-badge">
            YOUR POINTS: <span id="navPoints">...</span>
        </div>
    </nav>

    <div class="shortlinks-container">
        <!-- Info Banner -->
        <div class="info-banner">
            <div>
                <div class="banner-title"><span>DAILY REWARDS</span> — COMPLETE LINKS</div>
                <div class="banner-desc">Links reset automatically 24 hours after completion. Earn points daily!</div>
            </div>
            <div class="reward-pill">🔥 EACH LINK = 3 POINTS</div>
        </div>

        <!-- Links Loader & Container -->
        <div id="linksLoader" class="loader-message">LOADING LINKS & VERIFYING COMPLETIONS...</div>
        <div id="linksContainer" class="links-grid hidden"></div>
    </div>

    <script>
        // --------------------------------------------------------------
        // !!! ABSOLUTELY NO FUNCTIONAL CHANGES - ORIGINAL LOGIC PRESERVED !!!
        // Only visual redesign (CSS). All Supabase queries, auth handling,
        // local storage fallback, and link completion logic remain identical.
        // --------------------------------------------------------------
        
        const SUPABASE_URL = 'https://qilhlovlotvieatbtkhw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbGhsb3Zsb3R2aWVhdGJ0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjQ4MDYsImV4cCI6MjA5NDM0MDgwNn0.b7NeZuXf_IighzSDDV2OpgIlM0QiaeKHBwyz2leo1GA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUserId = null;

        async function initShortlinksPage() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                currentUserId = user.id;
            } else {
                // Fallback to localStorage (original logic preserved)
                const sessionText = localStorage.getItem('sb-qilhlovlotvieatbtkhw-auth-token');
                if (sessionText) {
                    try {
                        currentUserId = JSON.parse(sessionText)?.user?.id;
                    } catch(e) { currentUserId = null; }
                }
            }

            if (!currentUserId) {
                window.location.href = 'auth.html';
                return;
            }

            // Fetch and display user points
            const { data: profile } = await supabaseClient.from('profiles').select('points').eq('id', currentUserId).single();
            if (profile) document.getElementById('navPoints').innerText = profile.points;

            await loadAndRenderLinks();
        }

        async function loadAndRenderLinks() {
            const { data: allLinks, error: linksError } = await supabaseClient
                .from('available_links')
                .select('*')
                .order('id', { ascending: true });
            
            const time24HoursAgo = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const { data: recentClicks, error: clicksError } = await supabaseClient
                .from('user_clicks')
                .select('link_id')
                .eq('user_id', currentUserId)
                .gte('clicked_at', time24HoursAgo);

            if (linksError || clicksError) {
                document.getElementById('linksLoader').innerText = "ERROR LOADING LINKS. PLEASE REFRESH.";
                return;
            }

            const completedLinkIds = recentClicks.map(click => click.link_id);
            const container = document.getElementById('linksContainer');
            const loader = document.getElementById('linksLoader');
            container.innerHTML = '';

            allLinks.forEach((link, index) => {
                const isDone = completedLinkIds.includes(link.id);
                const card = document.createElement('div');
                card.className = `link-card ${isDone ? 'completed' : ''}`;
                
                card.innerHTML = `
                    <div class="link-header">
                        <span class="provider-tag ${!isDone ? 'active' : ''}">${escapeHtml(link.provider_name)}</span>
                        <span class="link-id">LINK #${link.id}</span>
                    </div>
                    <div class="reward-text ${!isDone ? 'active' : 'completed'}">
                        +${link.points_reward} POINTS REWARD
                    </div>
                `;
                
                const actionBtn = document.createElement('button');
                actionBtn.className = `action-btn ${isDone ? 'completed' : 'active'}`;
                actionBtn.disabled = isDone;
                actionBtn.innerText = isDone ? 'COMPLETED 🔒' : 'START NOW ⚡';
                
                if (!isDone) {
                    actionBtn.onclick = () => {
                        window.open(link.short_url, '_blank');
                    };
                }
                
                card.appendChild(actionBtn);
                container.appendChild(card);
            });

            loader.classList.add('hidden');
            container.classList.remove('hidden');
        }

        // Simple XSS protection (preserves original data)
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        initShortlinksPage();
    </script>
</body>
</html>
