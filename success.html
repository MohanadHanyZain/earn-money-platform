<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تأكيد الجائزة... ⏳</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center font-sans">

    <div class="bg-gray-800 p-8 rounded-2xl border border-gray-700 text-center max-w-md shadow-2xl">
        <div id="loadingIcon" class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-500 mx-auto mb-6"></div>
        
        <h2 id="statusTitle" class="text-xl font-bold mb-2 text-yellow-400">جاري التحقق من تخطي الرابط...</h2>
        <p id="statusMessage" class="text-gray-400 text-sm mb-6">برجاء الانتظار ثوانٍ معدودة لإضافة النقاط إلى حسابك بنجاح.</p>
        
        <a href="shortlinks.html" id="backBtn" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-lg transition shadow-md">
            🔗 العودة لصفحة الروابط
        </a>
    </div>

    <script>
    async function verifyAndCredit() {
        // 1. التقاط الـ uid من رابط الصفحة الحالي
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('uid');

        const statusTitle = document.getElementById('statusTitle');
        const statusMessage = document.getElementById('statusMessage');
        const loadingIcon = document.getElementById('loadingIcon');
        const backBtn = document.getElementById('backBtn');

        if (!userId) {
            statusTitle.innerText = "❌ خطأ في التحقق";
            statusTitle.className = "text-xl font-bold mb-2 text-red-500";
            statusMessage.innerText = "لم نتمكن من العثور على معرّف المستخدم الحقيقي.";
            loadingIcon.classList.add('hidden');
            backBtn.classList.remove('hidden');
            return;
        }

        try {
            // رابط الدالة الذكية الخاصة بك
            const EDGE_FUNCTION_URL = `https://qilhlovlotvieatbtkhw.supabase.co/functions/v1/smart-service?uid=${userId}`;
            
            // مفتاح الأمان الخاص بمشروعك لفك حظر الـ 401
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbGhsb3Zsb3R2aWVhdGJ0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjQ4MDYsImV4cCI6MjA5NDM0MDgwNn0.b7NeZuXf_IighzSDDV2OpgIlM0QiaeKHBwyz2leo1GA';

            // 2. إرسال الطلب مع تمرير مفتاح الأمان في الـ Headers
            const response = await fetch(EDGE_FUNCTION_URL, {
                method: 'GET',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}` // كارت العبور الآمن للسيرفر
                }
            });

            const result = await response.json();

            if (response.ok && result.success) {
                // نجاح العملية واحتساب النقاط
                statusTitle.innerText = "🎉 مبروك! تم إضافة النقاط";
                statusTitle.className = "text-xl font-bold mb-2 text-green-400";
                statusMessage.innerText = "تم التحقق بنجاح وإضافة نقطتين إلى رصيدك الحالي.";
            } else {
                throw new Error(result.error || "فشل السيرفر في معالجة الطلب");
            }

        } catch (err) {
            statusTitle.innerText = "⚠️ حدث خطأ أثناء التحديث";
            statusTitle.className = "text-xl font-bold mb-2 text-red-400";
            statusMessage.innerText = err.message || "تأكد من إعدادات الاتصال بالسيرفر.";
        } finally {
            loadingIcon.classList.add('hidden');
            backBtn.classList.remove('hidden');
        }
    }

    // تشغيل الفحص فور تحميل الصفحة
    verifyAndCredit();
</script>
</body>
</html>
