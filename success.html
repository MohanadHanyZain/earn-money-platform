<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تأكيد الجائزة... ⏳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #111827 100%);
        }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center font-sans p-4">

    <div class="bg-gray-800/90 backdrop-blur-sm p-8 rounded-2xl border border-green-500/30 text-center max-w-md shadow-2xl">
        <div id="loadingIcon" class="animate-spin rounded-full h-16 w-16 border-t-4 border-green-400 mx-auto mb-6"></div>
        
        <h2 id="statusTitle" class="text-xl font-bold mb-2 text-yellow-400 flex items-center justify-center gap-2">
            <i class="fas fa-hourglass-half"></i> جاري التحقق من تخطي الرابط...
        </h2>
        <p id="statusMessage" class="text-gray-400 text-sm mb-6">برجاء الانتظار ثوانٍ معدودة لإضافة النقاط إلى حسابك بنجاح.</p>
        
        <a href="shortlinks.html" id="backBtn" class="hidden bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-2.5 px-6 rounded-lg transition transform hover:scale-105 shadow-md inline-flex items-center gap-2">
            <i class="fas fa-link"></i> العودة لصفحة الروابط
        </a>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    async function verifyAndCredit() {
        // 1. التقاط الـ uid من رابط الصفحة الحالي
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('uid');

        const statusTitle = document.getElementById('statusTitle');
        const statusMessage = document.getElementById('statusMessage');
        const loadingIcon = document.getElementById('loadingIcon');
        const backBtn = document.getElementById('backBtn');

        if (!userId) {
            statusTitle.innerHTML = '<i class="fas fa-times-circle"></i> خطأ في التحقق';
            statusTitle.className = "text-xl font-bold mb-2 text-red-500 flex items-center justify-center gap-2";
            statusMessage.innerText = "لم نتمكن من العثور على معرّف المستخدم الحقيقي.";
            loadingIcon.classList.add('hidden');
            backBtn.classList.remove('hidden');
            return;
        }

        try {
            // 2. تهيئة عميل سوبابيز مباشرة داخل الصفحة (المكتبة تتعامل مع الأمان تلقائياً)
            const SUPABASE_URL = 'https://qilhlovlotvieatbtkhw.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbGhsb3Zsb3R2aWVhdGJ0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjQ4MDYsImV4cCI6MjA5NDM0MDgwNn0.b7NeZuXf_IighzSDDV2OpgIlM0QiaeKHBwyz2leo1GA';
            
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // 3. استدعاء دالة الـ SQL (RPC) مباشرة لتحديث نقاط المستخدم بأمان وبدون إيرور 401
            const { data, error } = await supabaseClient.rpc('confirm_shortlink_payout', {
                _user_id: userId
            });

            if (error) throw error;

            // نجاح العملية واحتساب النقاط
            statusTitle.innerHTML = '<i class="fas fa-check-circle"></i> مبروك! تم إضافة النقاط';
            statusTitle.className = "text-xl font-bold mb-2 text-green-400 flex items-center justify-center gap-2";
            statusMessage.innerText = "تم التحقق بنجاح وإضافة نقطتين إلى رصيدك الحالي.";

        } catch (err) {
            console.error(err);
            statusTitle.innerHTML = '<i class="fas fa-exclamation-circle"></i> حدث خطأ أثناء التحديث';
            statusTitle.className = "text-xl font-bold mb-2 text-red-400 flex items-center justify-center gap-2";
            statusMessage.innerText = err.message || "تأكد من إعدادات الاتصال بالسيرفر.";
        } finally {
            loadingIcon.classList.add('hidden');
            backBtn.classList.remove('hidden');
        }
    }

    // تشغيل الفحص فور تحميل الصفحة
    verifyAndCredit();
</script>
</body>
</html>
