<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Claim Status | Enterprise Earnings Platform</title>
    <style>
        /* ---------- RESET & BASE - Corporate Dark Mode | Strict | Minimal ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0A0C10;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, 'Helvetica Neue', sans-serif;
            color: #E8EDF2;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Professional scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #14171C;
        }
        ::-webkit-scrollbar-thumb {
            background: #2C3038;
            border-radius: 0px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3F444E;
        }

        /* Main corporate card - rigid geometry, no rounded corners */
        .corporate-card {
            max-width: 480px;
            width: 100%;
            background-color: #0F1117;
            border: 1px solid #1F222A;
            padding: 2rem 1.75rem;
            text-align: center;
        }

        /* Icon containers */
        .icon-container {
            margin-bottom: 1.25rem;
            min-height: 72px;
        }
        .icon-loading {
            font-size: 3rem;
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        .icon-success {
            font-size: 3rem;
            display: inline-block;
        }
        .icon-error {
            font-size: 3rem;
            display: inline-block;
        }
        .hidden {
            display: none;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Typography */
        .status-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.2px;
        }
        .status-title.success {
            color: #10B981;
        }
        .status-title.error {
            color: #EF4444;
        }
        .status-title.loading {
            color: #E5E9F0;
        }
        .message-text {
            color: #9CA3AF;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        /* Back button - strict corporate style */
        .back-btn {
            display: inline-block;
            background-color: transparent;
            border: 1px solid #2C303A;
            color: #9CA3AF;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 0.6rem 1.5rem;
            transition: all 0.2s ease;
            font-family: inherit;
            cursor: pointer;
        }
        .back-btn:hover {
            border-color: #3B82F6;
            color: #3B82F6;
        }

        /* No border radius - strict corporate geometry */
        .corporate-card, .back-btn {
            border-radius: 0px;
        }

        /* Responsive adjustments - mobile perfection */
        @media (max-width: 480px) {
            .corporate-card {
                padding: 1.5rem 1.25rem;
            }
            .status-title {
                font-size: 1.25rem;
            }
            .message-text {
                font-size: 0.8rem;
            }
            .icon-loading, .icon-success, .icon-error {
                font-size: 2.5rem;
            }
            .icon-container {
                min-height: 60px;
                margin-bottom: 1rem;
            }
        }

        /* Accessibility focus outlines */
        .back-btn:focus-visible {
            outline: 2px solid #3B82F6;
            outline-offset: 2px;
        }
    </style>
</head>
<body>

    <div class="corporate-card">
        <!-- Loading Icon -->
        <div id="loadingIcon" class="icon-container">
            <div class="icon-loading">⏳</div>
        </div>
        <!-- Success Icon (hidden initially) -->
        <div id="successIcon" class="icon-container hidden">
            <div class="icon-success">✓</div>
        </div>
        <!-- Error Icon (hidden initially) -->
        <div id="errorIcon" class="icon-container hidden">
            <div class="icon-error">✗</div>
        </div>
        
        <h2 id="statusTitle" class="status-title loading">VERIFYING COMPLETION...</h2>
        <p id="msg" class="message-text">Please wait while we process your request and add points to your account.</p>
        
        <a href="shortlinks.html" class="back-btn">← BACK TO SHORTLINKS</a>
    </div>

    <script>
        // --------------------------------------------------------------
        // !!! ABSOLUTELY NO FUNCTIONAL CHANGES - ORIGINAL LOGIC PRESERVED !!!
        // Only visual redesign (CSS). All claim logic, localStorage parsing,
        // Edge Function calls, and error handling remain identical.
        // --------------------------------------------------------------
        
        async function claimPoints() {
            const msgEl = document.getElementById('msg');
            const titleEl = document.getElementById('statusTitle');
            const loadEl = document.getElementById('loadingIcon');
            const successEl = document.getElementById('successIcon');
            const errorEl = document.getElementById('errorIcon');

            // 1. Extract user ID from localStorage (original logic)
            let userId = null;
            const sessionText = localStorage.getItem('sb-qilhlovlotvieatbtkhw-auth-token');
            if (sessionText) {
                try {
                    userId = JSON.parse(sessionText)?.user?.id;
                } catch(e) {
                    userId = null;
                }
            }

            // 2. Get link ID from URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const linkId = urlParams.get('linkid');

            if (!userId) {
                loadEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
                titleEl.innerText = "AUTHENTICATION FAILED";
                titleEl.className = "status-title error";
                msgEl.innerText = "Unable to verify your account. Please log in again.";
                return;
            }

            if (!linkId) {
                loadEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
                titleEl.innerText = "MISSING DATA";
                titleEl.className = "status-title error";
                msgEl.innerText = "Unable to identify the completed link.";
                return;
            }

            try {
                // 3. Send request to Supabase Edge Function (original endpoint)
                const response = await fetch('https://qilhlovlotvieatbtkhw.supabase.co/functions/v1/smart-service', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userId, linkId: linkId })
                });

                const result = await response.json();

                loadEl.classList.add('hidden');

                if (response.ok && result.success) {
                    successEl.classList.remove('hidden');
                    titleEl.innerText = "SUCCESS! POINTS ADDED";
                    titleEl.className = "status-title success";
                    msgEl.innerText = "Your reward has been credited and the link is locked for 24 hours.";
                } else {
                    errorEl.classList.remove('hidden');
                    titleEl.innerText = "REQUEST FAILED";
                    titleEl.className = "status-title error";
                    msgEl.innerText = result.error || "The operation could not be completed.";
                }
            } catch (err) {
                loadEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
                titleEl.innerText = "CONNECTION ERROR";
                titleEl.className = "status-title error";
                msgEl.innerText = "An unexpected error occurred while contacting the server.";
            }
        }

        // Execute claim function on page load
        window.onload = claimPoints;
    </script>
</body>
</html>
