<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحب الأرباح - منصتي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <div class="max-w-md mx-auto p-6">
        <h2 class="text-2xl font-bold mb-6 text-center text-green-400">سحب الأرباح</h2>

        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 mb-6 text-center">
            <p class="text-gray-400 text-sm">رصيدك الحالي</p>
            <div id="userPoints" class="text-4xl font-black text-white my-2">0</div>
            <!-- <p class="text-green-500 text-xs font-bold">نقاط جاهزة للسحب</p> -->
        </div>

        <form id="withdrawForm" class="space-y-4">
            <div>
                <label class="block text-sm mb-2 text-gray-400">اختر العملة (على FaucetPay)</label>
                <select id="cryptoCurrency" class="w-full bg-gray-700 border border-gray-600 rounded p-3 text-white focus:outline-none focus:border-green-500">
                    <option value="LTC">Litecoin (LTC) - أسرع وسيله</option>
                    <option value="USDT">Tether (USDT)</option>
                    <option value="BTC">Bitcoin (BTC)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm mb-2 text-gray-400">كمية النقاط للسحب</label>
                <input type="number" id="withdrawAmount" min="1000" placeholder="أقل كمية 1000 نقطة" class="w-full bg-gray-700 border border-gray-600 rounded p-3 text-white" required>
            </div>

            <div>
                <label class="block text-sm mb-2 text-gray-400">بريد FaucetPay الإلكتروني</label>
                <input type="email" id="walletAddress" placeholder="email@example.com" class="w-full bg-gray-700 border border-gray-600 rounded p-3 text-white" required>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg transition shadow-lg">
                تقديم طلب السحب
            </button>
        </form>

        <p id="msg" class="mt-4 text-center text-sm font-semibold"></p>
    </div>

    <script>
        // إعدادات سوبابيز الخاصة بك
        const SUPABASE_URL = 'https://qilhlovlotvieatbtkhw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbGhsb3Zsb3R2aWVhdGJ0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjQ4MDYsImV4cCI6MjA5NDM0MDgwNn0.b7NeZuXf_IighzSDDV2OpgIlM0QiaeKHBwyz2leo1GA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentPoints = 0;

        // جلب رصيد المستخدم وعرضه
        async function fetchBalance() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }

            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('points')
                .eq('id', user.id)
                .single();
            
            if (profile) {
                currentPoints = parseInt(profile.points) || 0;
                document.getElementById('userPoints').innerText = currentPoints;
            }
        }

        // معالجة طلب السحب بأمان
        document.getElementById('withdrawForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const msgEl = document.getElementById('msg');
            const btn = document.getElementById('submitBtn');
            
            msgEl.innerText = ""; // تهيئة الرسالة
            
            const amount = parseInt(document.getElementById('withdrawAmount').value);
            const crypto = document.getElementById('cryptoCurrency').value;
            const wallet = document.getElementById('walletAddress').value;

            // 1. فحص الحماية البرمجية الأساسية قبل مراسلة السيرفر
            if (isNaN(amount) || amount < 1000) {
                msgEl.innerText = "❌ عذراً، الحد الأدنى للسحب هو 1000 نقطة.";
                msgEl.className = "text-red-500 text-center mt-4";
                return;
            }

            if (amount > currentPoints) {
                msgEl.innerText = `❌ رصيدك غير كافٍ. رصيدك الحالي هو ${currentPoints} نقطة فقط.`;
                msgEl.className = "text-red-500 text-center mt-4";
                return;
            }

            // قفل الزرار لمنع الضغط المتكرر أثناء تنفيذ العملية
            btn.disabled = true;
            btn.innerText = 'جاري المعالجة وأمان العملية...';

            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) throw new Error("لم يتم العثور على جلسة مستخدم نشطة.");

                // 2. الأمان أولاً: استدعاء دالة الخصم من قاعدة البيانات مباشرة
                // الدالة ترجع خطأ تلقائياً إذا حاول التلاعب بالبيانات بفضل شرط الـ IF بالـ SQL الخاص بك
                const { error: deductError } = await supabaseClient.rpc('deduct_points', { 
                    _user_id: user.id, 
                    _amount: amount 
                });

                if (deductError) {
                    throw new Error(deductError.message);
                }

                // 3. التسجيل ثانياً: طالما نجح الخصم بنجاح، نقوم الآن بتسجيل الطلب بأمان تام
                const { error: insertError } = await supabaseClient.from('withdrawals').insert({
                    user_id: user.id,
                    amount_points: amount,
                    crypto_currency: crypto,
                    wallet_address: wallet,
                    status: 'pending'
                });

                if (insertError) {
                    // حماية احتياطية نادرة جداً: لو نجح الخصم وفشل التسجيل لأي سبب في شبكة قاعدة البيانات
                    throw new Error("حدثت مشكلة أثناء تسجيل الطلب، يرجى التواصل مع الدعم الفني.");
                }

                // نجاح العملية بالكامل
                msgEl.innerText = "🎉 تم تقديم طلبك بنجاح! سيتم مراجعته وإرساله لمحفظتك خلال 24 ساعة.";
                msgEl.className = "text-green-500 text-center mt-4";
                document.getElementById('withdrawForm').reset(); // تصفير الحقول المتواجدة بالفروم
                
                await fetchBalance(); // تحديث رقم الرصيد في الشاشة فوراً بعد الخصم

            } catch (err) {
                msgEl.innerText = "خطأ: " + err.message;
                msgEl.className = "text-red-500 text-center mt-4";
            } finally {
                // إعادة تفعيل الزرار
                btn.disabled = false;
                btn.innerText = 'تقديم طلب السحب';
            }
        };

        // تهيئة الصفحة عند الدخول أول مرة
        initPage();
        
        async function initPage() {
            await fetchBalance();
        }
    </script>
</body>
</html>
